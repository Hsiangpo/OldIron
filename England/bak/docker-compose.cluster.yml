services:
  postgres:
    image: postgres:16-alpine
    container_name: oldiron-england-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oldiron_england
    ports:
      - "6543:5432"
    volumes:
      - oldiron_england_pgdata:/var/lib/postgresql/data

volumes:
  oldiron_england_pgdata:
